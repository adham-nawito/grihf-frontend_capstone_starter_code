<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet"
      href="../styles.css">
    <link rel="stylesheet"
      href="./Sign_Up.css">
  </head>

  <body>
    <main class="container">
      <h1>Sign Up</h1>
      <p> Already a member?
        <a href="../Login/Login.html" style="color: var(--color-primary);">Login</a>
      </p>
      <form>

        <div
          class="form-item-container">
          <label
            for="username">Role *</label>
          <select id="role" name="role" required>
            <option value="doctor">
              Doctor</option>
            <option value="patient">
              Patient</option>
          </select>
        </div>

        <div
          class="form-item-container">
          <label
            for="username">Name *</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-item-container">
          <label for="phone">Phone *</label>
          <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="form-item-container">
          <label for="email">Email *</label>
          <input type="text" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-item-container">
          <label for="password">Password *</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <span class="toggle-password">
              <img id="eye-icon" src="../assets/hide.png" alt="Toggle password" width="18">
            </span>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap:10px; width: 270px;">
          <button type="submit" class="btn-primary">Submit</button>
          <button type="button" class="btn-alert">Reset</button>
        </div>
      </form>
    </main>
  </body>

</html>
